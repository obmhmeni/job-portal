<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post New Job - Job Portal Bihar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/recruiter/dashboard">
                <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
            </a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                    <div class="card-header bg-primary text-white text-center py-4">
                        <h3 class="mb-0 fw-bold"><i class="fas fa-briefcase me-2"></i>Post a New Job</h3>
                        <small>Reach skilled professionals in Bihar instantly</small>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <form id="jobPostForm">
                            <div class="mb-4">
                                <label class="form-label fw-bold">Job Title / Position <span class="text-danger">*</span></label>
                                <input type="text" id="job_name" class="form-control form-control-lg" placeholder="e.g. Skilled Mason Required in Patna" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Job Description (max 100 words) <span class="text-danger">*</span></label>
                                <textarea id="description" class="form-control form-control-lg" rows="6" placeholder="Describe responsibilities, work type, duration, etc." required></textarea>
                                <div class="d-flex justify-content-between mt-1">
                                    <small id="wordCount" class="text-muted">0 / 100 words</small>
                                    <small class="text-muted">Be clear and specific</small>
                                </div>
                            </div>

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Location <span class="text-danger">*</span></label>
                                    <input type="text" id="location" class="form-control" placeholder="e.g. Patna, Gaya, Muzaffarpur" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Salary / Wage <span class="text-danger">*</span></label>
                                    <input type="text" id="salary" class="form-control" placeholder="e.g. ₹25,000/month or ₹900/day" required>
                                </div>
                            </div>

                            <div class="row g-3 mt-2">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Required Experience</label>
                                    <input type="text" id="required_experience" class="form-control" placeholder="e.g. 2+ years or Fresher">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Required Qualification</label>
                                    <input type="text" id="required_qualification" class="form-control" placeholder="e.g. ITI, 10th Pass, Diploma">
                                </div>
                            </div>

                            <div class="mt-3">
                                <label class="form-label fw-bold">Required Skills (comma separated) <span class="text-danger">*</span></label>
                                <input type="text" id="required_skills" class="form-control" placeholder="e.g. masonry, welding, electrical wiring, plumbing, freelancing" required>
                                <small class="text-muted">Separate with commas – helps in matching</small>
                            </div>

                            <div class="row g-3 mt-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Number of People Needed <span class="text-danger">*</span></label>
                                    <input type="number" id="num_people" class="form-control" min="1" value="1" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Company / Individual Info (optional)</label>
                                    <textarea id="company_info" class="form-control" rows="2" placeholder="e.g. ABC Construction, Patna"></textarea>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success btn-lg w-100 mt-4 fw-bold">
                                <i class="fas fa-paper-plane me-2"></i>Post Job Now
                            </button>
                        </form>

                        <!-- Messages -->
                        <div id="successMessage" class="alert alert-success mt-4 d-none text-center fw-bold">
                            Job posted successfully! Redirecting to dashboard...
                        </div>
                        <div id="errorMessage" class="alert alert-danger mt-4 d-none text-center"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Word counter for description
        const desc = document.getElementById('description');
        const countDisplay = document.getElementById('wordCount');
        desc.addEventListener('input', () => {
            const text = desc.value.trim();
            const words = text ? text.split(/\s+/).length : 0;
            countDisplay.textContent = `${words} / 100 words`;
            if (words > 100) {
                const wordArray = text.split(/\s+/).slice(0, 100);
                desc.value = wordArray.join(' ');
                countDisplay.textContent = `100 / 100 words`;
            }
        });

        // Form submit
        document.getElementById('jobPostForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                job_name: document.getElementById('job_name').value.trim(),
                description: document.getElementById('description').value.trim(),
                location: document.getElementById('location').value.trim(),
                salary: document.getElementById('salary').value.trim(),
                required_experience: document.getElementById('required_experience').value.trim(),
                required_qualification: document.getElementById('required_qualification').value.trim(),
                required_skills: document.getElementById('required_skills').value.trim(),
                num_people: parseInt(document.getElementById('num_people').value) || 1,
                company_info: document.getElementById('company_info').value.trim()
            };

            // Simple frontend validation
            if (!formData.job_name || !formData.description || !formData.location || !formData.salary || !formData.required_skills) {
                document.getElementById('errorMessage').textContent = 'Please fill all required fields';
                document.getElementById('errorMessage').classList.remove('d-none');
                return;
            }

            try {
                const response = await fetch('/jobs/post-job', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.success) {
                    document.getElementById('successMessage').classList.remove('d-none');
                    document.getElementById('errorMessage').classList.add('d-none');
                    setTimeout(() => {
                        window.location.href = result.redirect || '/recruiter/dashboard';
                    }, 2000);
                } else {
                    document.getElementById('errorMessage').textContent = result.error || 'Failed to post job';
                    document.getElementById('errorMessage').classList.remove('d-none');
                    document.getElementById('successMessage').classList.add('d-none');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('errorMessage').textContent = 'Network error. Please check your connection.';
                document.getElementById('errorMessage').classList.remove('d-none');
            }
        });
    </script>
</body>
</html>

<!-- Similar to signup, but fields: email/phone, password -->
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Login</h2>
                    <form id="loginForm">
                        <input type="text" id="email" class="form-control mb-3" placeholder="Email or Phone" required>
                        <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {email: document.getElementById('email').value, password: document.getElementById('password').value};
        const res = await fetch('/login', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
        const json = await res.json();
        if (json.success) {
            window.location.href = json.redirect;
        } else {
            alert(json.error);
        }
    });
</script>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Job Portal Bihar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4 fw-bold text-primary">Login to Your Account</h2>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email or Phone Number</label>
                                <input type="text" id="email" class="form-control form-control-lg" placeholder="Enter email or phone" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" id="password" class="form-control form-control-lg" placeholder="Enter password" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100">Login</button>
                        </form>
                        <p class="text-center mt-3">
                            Don't have an account? <a href="/signup" class="text-primary">Sign Up</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const emailInput = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!emailInput || !password) {
                alert('Please fill all fields');
                return;
            }

            const data = { email: emailInput, password };

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const json = await res.json();

                if (json.success) {
                    // Optional: Welcome popup ke liye
                    sessionStorage.setItem('welcomeName', json.name || 'User');
                    sessionStorage.setItem('justLoggedIn', 'true');  // Flag for popup in index or dashboard

                    // Redirect to role-based dashboard
                    window.location.href = json.redirect;
                } else {
                    alert(json.error || 'Invalid email/phone or password');
                }
            } catch (err) {
                console.error('Login error:', err);
                alert('Something went wrong. Please try again or check your connection.');
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

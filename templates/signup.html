<!DOCTYPE html>
<html lang="hi">
<head>
    <title>Signup - Job Portal Bihar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4">Sign Up as {{ role.upper() }}</h2>
                        <form id="signupForm">
                            <input type="text" id="name" class="form-control mb-3" placeholder="Full Name" required>
                            <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>
                            <input type="tel" id="phone" class="form-control mb-3" placeholder="Phone Number" required>
                            <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>
                            <select id="state" class="form-select mb-3">
                                <option>Select State</option>
                                <option>Bihar</option>
                                <option>Uttar Pradesh</option>
                                <!-- Add more -->
                            </select>
                            <button type="submit" class="btn btn-primary w-100">Sign Up</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('password').value,
                state: document.getElementById('state').value
            };
            const res = await fetch('/signup', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            const json = await res.json();
            window.location.href = json.redirect;
        });
    </script>
</body>
</html>
